    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { margin: 0; }
    html, body, #root { height: 100%; }

    .float-a, .float-b, .float-c, .float-rot-a, .float-rot-b, .float-rot-c { animation: none; transform: translate(-50%, -50%); }

    .toggle-btn:hover { background: #f7f8f8 !important; }
    .who-contact-btn:hover { background: #f7f8f8 !important; }

    /* Toggle switch states */
    /* Radius slider tooltip */
    .radius-tooltip { pointer-events: none; }

    .spk-toggle { cursor: pointer; }
    .spk-toggle .spk-toggle-track { transition: background 0.15s; }
    .spk-toggle.off .spk-toggle-track  { background: #a0aab0; }
    .spk-toggle.on  .spk-toggle-track  { background: #0056ce; }
    .spk-toggle.off:hover .spk-toggle-track  { background: #818d96; }
    .spk-toggle.on:hover  .spk-toggle-track  { background: #0045a6; }
    .spk-toggle.off:active .spk-toggle-track { background: #61717c; }
    .spk-toggle.on:active  .spk-toggle-track { background: #003987; }
    .spk-toggle:focus-visible { outline: none; }
    .spk-toggle:focus-visible .spk-toggle-track { outline: 2px solid #0056ce; outline-offset: 2px; border-radius: 100px; }
    .spk-toggle.disabled { opacity: 0.5; pointer-events: none; }
    .spk-toggle .spk-toggle-knob { transition: left 0.15s; }
    .who-contact-icon-active   { filter: brightness(0) saturate(100%) invert(16%) sepia(94%) saturate(1600%) hue-rotate(210deg) brightness(85%); }
    .who-contact-icon-inactive { filter: brightness(0) saturate(100%) invert(35%) sepia(10%) saturate(400%) hue-rotate(170deg) brightness(90%); }
    .ms-include { color: #0e0f10; }
    .ms-include:hover, .ms-include.active { color: #0056CE !important; }
    .ms-exclude { color: #0e0f10; }
    .ms-exclude:hover, .ms-exclude.active { color: #CB3030 !important; }
    .ms-include.active, .ms-exclude.active { font-weight: 600; }

    .filter-tag {
      position: relative; display: inline-flex; align-items: center;
      height: 24px; padding: 0 8px; border-radius: 4px;
      max-width: 120px; overflow: hidden; cursor: default;
    }
    .filter-tag-include { background: #edf5ff; }
    .filter-tag-exclude { background: #ffecec; }
    .filter-tag .tag-text {
      font-size: 12px; font-weight: 600; line-height: 16px;
      letter-spacing: 0.24px; color: #0e0f10; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .filter-tag .tag-close {
      display: none; position: absolute; right: 0; top: 0; bottom: 0;
      width: 24px; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2;
    }
    .filter-tag .tag-fade {
      display: none; position: absolute; right: 24px; top: 0; bottom: 0;
      width: 20px; pointer-events: none; z-index: 2;
    }
    .filter-tag-include .tag-fade { background: linear-gradient(to right, transparent, #edf5ff); }
    .filter-tag-exclude .tag-fade { background: linear-gradient(to right, transparent, #ffecec); }
    .filter-tag-include .tag-close { background: #edf5ff; }
    .filter-tag-exclude .tag-close { background: #ffecec; }
    .filter-tag:hover .tag-close { display: flex; }
    .filter-tag:hover .tag-fade { display: block; }
    @keyframes toastSlideIn {
      from { transform: translateY(calc(100% + 30px)); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastSlideOut {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(calc(100% + 30px)); opacity: 0; }
    }
    .toast-enter { animation: toastSlideIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .toast-exit  { animation: toastSlideOut 0.25s ease-in forwards; }
    .count-tag-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
    .count-tag-tooltip {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #4e5a63; border-radius: 4px; padding: 8px;
      white-space: nowrap; font-size: 12px; color: white; font-family: Helvetica, sans-serif;
      line-height: 16px; z-index: 100; pointer-events: none;
    }
    .count-tag-tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%) rotate(45deg);
      width: 8px; height: 8px; background: #4e5a63; margin-top: -4px;
    }
    .count-tag-wrap:hover .count-tag-tooltip { display: block; }
  </style>

    // ── Filter control components ──────────────────────────────────────────────
    const imgArrowDown = "https://www.figma.com/api/mcp/asset/3ba1e838-8f5e-4ee3-a6b6-e176968e745e";

    function FilterArrow({ up = false }) {

          <div style={{ position:"absolute", display:"flex", top:"36.48%", right:"28.12%", bottom:"37.5%", left:"28.12%", alignItems:"center", justifyContent:"center" }}>

    function FilterTextField({ placeholder }) {
      return (
        <div style={{ background:"white", border:"1px solid #c0c6cb", borderRadius:8, display:"flex", height:36, alignItems:"center", padding:"0 16px", width:"100%" }}>
          <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#4e5a63", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{placeholder}</span>
        </div>
      );
    }

    function FilterSelectField({ placeholder = "Select all that apply", options = [], dataKey, dataLabel }) {
      const [open, setOpen] = useState(false);
      const [value, setValue] = useState(null);
      const ref = useRef(null);
      const ctx = useContext(FilterSectionContext);
      const globalCtx = useContext(GlobalFilterContext);

      useEffect(() => {
        if (dataKey) globalCtx?.registerData(dataKey, null);
      }, []);

      useEffect(() => {
        function handleClick(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      // Reset when section clears
      useEffect(() => {
        if (ctx?.resetKey > 0) {
          setValue(null);
          setOpen(false);
          if (dataKey) globalCtx?.registerData(dataKey, null);
        }
      }, [ctx?.resetKey]);

      const isFilled = value !== null;
      const border = isFilled ? "1px solid #818d96" : "1px solid #c0c6cb";

      function handleSelect(opt) {
        if (!isFilled) ctx?.register(1);
        setValue(opt);
        setOpen(false);
        if (dataKey) globalCtx?.registerData(dataKey, { label: dataLabel || placeholder, tags: [{ text: opt, type: "include" }] });
      }
      function handleClear(e) {
        e.stopPropagation();
        if (isFilled) ctx?.register(-1);
        setValue(null);
        setOpen(false);
        if (dataKey) globalCtx?.registerData(dataKey, null);
      }

      return (
        <div ref={ref} style={{ position:"relative", width:"100%" }}>
          <div onClick={() => setOpen(o => !o)}
            style={{ background:"white", border, borderRadius:8, display:"flex", gap:4,
                     height:36, alignItems:"center", padding:"0 8px 0 16px", cursor:"pointer" }}>
            <span style={{ flex:1, fontSize:14, lineHeight:"20px",
                           color: isFilled ? "#0e0f10" : "#4e5a63",
                           overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {isFilled ? value : placeholder}
            </span>
            {isFilled
              ? <div onClick={handleClear}
                  style={{ width:20, height:20, cursor:"pointer", flexShrink:0 }}>
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" fill="#818d96"/><path d="M7.5 7.5l5 5M12.5 7.5l-5 5" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </div>
              : <FilterArrow up={open} />
            }
          </div>
          {open && options.length > 0 && (
            <div style={{ position:"absolute", top:44, left:0, right:0, zIndex:10,
                          background:"white", borderRadius:8, padding:"8px 0",
                          boxShadow:"0 12px 24px rgba(0,0,0,0.12), 0 0 2px rgba(0,0,0,0.12)",
                          maxHeight:320, overflowY:"auto" }}>
              {options.map(opt => (
                <div key={opt} onClick={() => handleSelect(opt)}
                  style={{ padding:"10px 16px", fontSize:14, lineHeight:"20px",
                           color:"#0e0f10", cursor:"pointer" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f7f8f8"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  {opt}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function FilterLabeledSelect({ label, placeholder, options = [] }) {
      const ctx = useContext(FilterSectionContext);
      const dataKey = (ctx?.title || "filter") + ":" + (label || placeholder || "select");
      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
          {label && <span style={{ fontSize:12, lineHeight:"16px", color:"#0e0f10" }}>{label}</span>}
          <FilterSelectField placeholder={placeholder} options={options} dataKey={dataKey} dataLabel={label || placeholder} />
        </div>
      );
    }

    function FilterMultiSelect({ label, placeholder = "Select all that apply", options = [] }) {
      const [open, setOpen] = useState(false);
      const [selections, setSelections] = useState({});
      const ref = useRef(null);
      const ctx = useContext(FilterSectionContext);
      const globalCtx = useContext(GlobalFilterContext);
      const prevCountRef = useRef(0);
      const dataKey = (ctx?.title || "filter") + ":" + (label || "main");

      useEffect(() => {
        globalCtx?.registerData(dataKey, null);
      }, []);

      useEffect(() => {
        function handleClick(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      useEffect(() => {
        if (ctx?.resetKey > 0) {
          setSelections({});
          setOpen(false);
          prevCountRef.current = 0;
          globalCtx?.registerData(dataKey, null);
        }
      }, [ctx?.resetKey]);

      const selectedCount = Object.values(selections).filter(Boolean).length;

      useEffect(() => {
        const prev = prevCountRef.current;
        const delta = selectedCount - prev;
        if (delta !== 0) ctx?.register(delta);
        prevCountRef.current = selectedCount;
        const entries = Object.entries(selections).filter(([, v]) => v);
        if (entries.length > 0) {
          globalCtx?.registerData(dataKey, {
            label: label || ctx?.title || "Filter",
            tags: entries.map(([opt, type]) => ({ text: opt, type }))
          });
        } else {
          globalCtx?.registerData(dataKey, null);
        }
      }, [selectedCount, selections]);

      function handleToggle(opt, type, e) {
        e.stopPropagation();
        setSelections(prev => {
          const next = { ...prev };
          if (next[opt] === type) { delete next[opt]; } else { next[opt] = type; }
          return next;
        });
      }

      const selectedEntries = Object.entries(selections).filter(([, v]) => v);

      function handleRemoveTag(opt, e) {
        e.stopPropagation();
        setSelections(prev => { const next = { ...prev }; delete next[opt]; return next; });
      }

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
          {label && <span style={{ fontSize:12, lineHeight:"16px", color:"#0e0f10" }}>{label}</span>}

          {/* Tags */}
          {selectedEntries.length > 0 && (
            <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
              {selectedEntries.map(([opt, type]) => (
                <div key={opt} className={`filter-tag filter-tag-${type}`}>
                  <span className="tag-text">{opt}</span>
                  <span className="tag-fade" />
                  <span className="tag-close" onClick={e => handleRemoveTag(opt, e)}>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M1 1L9 9M9 1L1 9" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                  </span>
                </div>
              ))}
            </div>
          )}

          <div ref={ref} style={{ position:"relative", width:"100%" }}>
            <div onClick={() => setOpen(o => !o)}
              style={{ background:"white", border:"1px solid #c0c6cb", borderRadius:8, display:"flex", gap:4,
                       height:36, alignItems:"center", padding:"0 8px 0 16px", cursor:"pointer" }}>
              <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#4e5a63",
                             overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                {placeholder}
              </span>
              <FilterArrow up={open} />
            </div>
            {open && options.length > 0 && (
              <div style={{ position:"absolute", top:44, left:0, right:0, zIndex:10,
                            background:"white", borderRadius:8, padding:"8px 0",
                            boxShadow:"0 12px 24px rgba(0,0,0,0.12), 0 0 2px rgba(0,0,0,0.12)",
                            maxHeight:320, overflowY:"auto" }}>
                {options.map(opt => {
                  const sel = selections[opt];
                  const isIncludeActive = sel === "include";
                  const isExcludeActive = sel === "exclude";
                  return (
                    <div key={opt}
                      style={{ display:"flex", alignItems:"center", height:40, padding:"0 16px", gap:4 }}
                      onMouseEnter={e => e.currentTarget.style.background = "#f7f8f8"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <span style={{ flex:1, fontSize:14, lineHeight:"20px",
                                     color: sel ? "#818d96" : "#0e0f10" }}>{opt}</span>

      const globalCtx = useContext(GlobalFilterContext);
      const dataKey = (ctx?.title || "filter") + ":" + (label || "togglegroup");

      useEffect(() => {
        globalCtx?.registerData(dataKey, null);
      }, []);

      // Reset when section clears
      useEffect(() => {
        if (ctx?.resetKey > 0) {
          setVal(opts[0]);
          globalCtx?.registerData(dataKey, null);

      }, [ctx?.resetKey]);

      function handleSelect(opt) {
        const wasDefault = val === opts[0];
        const isDefault = opt === opts[0];
        if (wasDefault && !isDefault) ctx?.register(1);
        if (!wasDefault && isDefault) ctx?.register(-1);
        setVal(opt);
        if (!isDefault) {
          globalCtx?.registerData(dataKey, { label, tags: [{ text: opt, type: opt === "Exclude" ? "exclude" : "include" }] });

    function RadiusSlider() {
      const [radius, setRadius] = React.useState(50);
      const [dragging, setDragging] = React.useState(false);
      const [hovering, setHovering] = React.useState(false);
      const trackRef = React.useRef(null);
      const min = 1, max = 50;
      const pct = ((radius - min) / (max - min)) * 100;

      const calcValue = React.useCallback((clientX) => {
        const rect = trackRef.current.getBoundingClientRect();
        const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
        return Math.round(min + (x / rect.width) * (max - min));
      }, []);

      React.useEffect(() => {
        if (!dragging) return;
        const onMove = (e) => setRadius(calcValue(e.clientX));
        const onUp   = () => setDragging(false);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
        return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
      }, [dragging, calcValue]);

      const showTooltip = dragging || hovering;
      const thumbImg  = dragging ? _sliderImgActive : hovering ? _sliderImgHover : _sliderImgDefault;
      const haloImg   = dragging ? _sliderHaloActive : _sliderHaloHover;

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
          <span style={{ fontSize:12, lineHeight:"16px", color:"#0e0f10" }}>Radius (miles)</span>
          <div>
            <div
              ref={trackRef}
              style={{ position:"relative", height:20, display:"flex", alignItems:"center", cursor:"pointer", userSelect:"none" }}
              onMouseDown={(e) => { setDragging(true); setRadius(calcValue(e.clientX)); }}
            >
              {/* Inactive track background */}
              <div style={{ position:"absolute", left:0, right:0, height:4, borderRadius:9999, background:"rgba(0,86,206,0.3)" }} />
              {/* Active track */}
              <div style={{ position:"absolute", left:0, width:`${pct}%`, height:4, background:"#0056ce", borderRadius:"9999px 0 0 9999px" }} />
              {/* Thumb */}
              <div
                style={{ position:"absolute", left:`${pct}%`, transform:"translateX(-50%)", width:20, height:20, zIndex:2, cursor:"pointer" }}
                onMouseEnter={() => setHovering(true)}
                onMouseLeave={() => { if (!dragging) setHovering(false); }}
              >
                {/* Tooltip */}
                {showTooltip && (
                  <div className="radius-tooltip" style={{ position:"absolute", bottom:"calc(100% + 10px)", left:"50%", transform:"translateX(-50%)", display:"flex", flexDirection:"column", alignItems:"center" }}>
                    <div style={{ background:"#0056ce", borderRadius:4, padding:"8px", display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <span style={{ color:"white", fontSize:14, fontWeight:600, lineHeight:"20px", whiteSpace:"nowrap" }}>{radius}</span>
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"center", height:4, width:16 }}>
                      <div style={{ width:8, height:8, background:"#0056ce", transform:"rotate(45deg)", marginTop:-4, flexShrink:0 }} />
                    </div>
                  </div>
                )}
                {/* Halo */}
                {(hovering || dragging) && (
                  <div style={{ position:"absolute", left:"50%", top:"50%", transform:"translate(-50%,-50%)", width:48, height:48, pointerEvents:"none" }}>
                    <img alt="" style={{ display:"block", width:"100%", height:"100%" }} src={haloImg} />
                  </div>
                )}
                {/* Thumb image */}
                <img alt="" style={{ position:"absolute", top:0, left:0, width:20, height:20, display:"block", pointerEvents:"none" }} src={thumbImg} />
              </div>
            </div>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between" }}>
            <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>1 mi</span>
            <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>50 mi</span>
          </div>
        </div>
      );
    }

    function ToastNotification({ onDismiss }) {
      const [exiting, setExiting] = React.useState(false);
      const dismiss = React.useCallback(() => {
        setExiting(true);
        setTimeout(onDismiss, 260);
      }, [onDismiss]);
      React.useEffect(() => {
        const t = setTimeout(dismiss, 4000);
        return () => clearTimeout(t);
      }, [dismiss]);
      return (
        <div className={exiting ? "toast-exit" : "toast-enter"} style={{ position:"fixed", bottom:30, left:30, zIndex:2000, display:"flex", alignItems:"stretch", background:"#f4fdfc", borderRadius:8, boxShadow:"0 12px 24px rgba(0,0,0,0.12), 0 0 2px rgba(0,0,0,0.12)", paddingTop:12, paddingBottom:12, paddingLeft:16, paddingRight:8, gap:4, minWidth:220 }}>

            <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>Reset to Default</span>
          </div>
          {/* Divider */}
          <div style={{ padding:"8px 0" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>
          {/* Search bar — icon trailing on right */}
          <div style={{ padding:"8px 16px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, height:36, border:"1px solid #c0c6cb", borderRadius:8, padding:"0 16px", background:"white" }}>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Search columns"
                style={{ flex:1, border:"none", outline:"none", fontSize:14, color:"#4e5a63", fontFamily:"inherit", background:"transparent", minWidth:0 }} />
              <div style={{ position:"relative", overflow:"hidden", width:20, height:20, flexShrink:0 }}>
                <div style={{ position:"absolute", inset:"12.5%" }}>
                  <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgEditColSearch2} />
                </div>
              </div>
            </div>
          </div>
          {/* Column list */}
          <div style={{ maxHeight:340, overflowY:"auto" }}>
            {filteredDefault.map(col => (
              <ColumnItem key={col.key} col={col} checked={visibleCols.has(col.key)} onChange={onChange} />
            ))}
            {filteredSections.map(({ section, cols }) => (
              <div key={section}>
                <div style={{ padding:"8px 0" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>
                <div style={{ padding:"8px 16px 4px", fontSize:12, fontWeight:500, color:"#4e5a63", letterSpacing:"0.24px", fontFamily:"Inter, sans-serif" }}>{section}</div>
                {cols.map(col => (
                  <ColumnItem key={col.key} col={col} checked={visibleCols.has(col.key)} onChange={onChange} />
                ))}
              </div>
            ))}
            {filteredDefault.length === 0 && filteredSections.length === 0 && (
              <div style={{ padding:"16px", textAlign:"center", fontSize:14, color:"#818d96" }}>No columns found</div>
            )}
          </div>
        </div>
      );
    }

    // ── Main section ──────────────────────────────────────────────────────────
    function MainSection({ filtersCollapsed, onToggleFilters }) {
      const [selectedRows, setSelectedRows] = React.useState(new Set());
      const [allSelected, setAllSelected] = React.useState(false);
      const [hoveredRow, setHoveredRow] = React.useState(null);
      const [currentPage, setCurrentPage] = React.useState(1);
      const [pageDropOpen, setPageDropOpen] = React.useState(false);
      const [visibleCols, setVisibleCols] = React.useState(new Set(DEFAULT_COL_KEYS));
      const [showEditCols, setShowEditCols] = React.useState(false);
      const editColsRef = React.useRef(null);
      const PAGE_SIZE = 25;
      const TOTAL_PAGES = Math.ceil(TOTAL_RECORDS / PAGE_SIZE);
      const pageRef = React.useRef(null);
      React.useEffect(() => {
        if (!pageDropOpen) return;
        const handler = (e) => { if (pageRef.current && !pageRef.current.contains(e.target)) setPageDropOpen(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [pageDropOpen]);
      React.useEffect(() => {
        if (!showEditCols) return;
        const handler = (e) => { if (editColsRef.current && !editColsRef.current.contains(e.target)) setShowEditCols(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showEditCols]);
      const activeCols = ALL_COLUMNS.filter(c => visibleCols.has(c.key));
      const handleColChange = (key, checked) => setVisibleCols(prev => { const next = new Set(prev); checked ? next.add(key) : next.delete(key); return next; });
      const handleColReset = () => setVisibleCols(new Set(DEFAULT_COL_KEYS));
      const toggleRow = (ri) => { setAllSelected(false); setSelectedRows(prev => {
        const next = new Set(prev);
        next.has(ri) ? next.delete(ri) : next.add(ri);
        return next;
      }); };
      const selectedCount = allSelected ? TOTAL_RECORDS : selectedRows.size;
      const anySelected = selectedCount > 0;
      return (
        <div style={{ flex:1, display:"flex", padding:"8px 0 0 8px", background:"#f7f8f8", overflow:"hidden", minWidth:0 }}>

          {/* Find Property Table container */}
          <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", background:"white", borderRadius:"4px 4px 0 0", border:"1px solid #dfe3e5", borderRight:"none", borderBottom:"none" }}>

            {/* Toolbar — 60px */}
            <div style={{ display:"flex", alignItems:"center", gap:8, padding:12, height:60, flexShrink:0, borderBottom:"1px solid #dfe3e5", background:"white" }}>
              {/* Hide/Show Filters */}
              <button onClick={onToggleFilters} style={{ display:"flex", alignItems:"center", gap:4, height:36, padding:"0 10px", borderRadius:8, border:"1px solid #818d96", background:"white", cursor:"pointer", fontFamily:"inherit", flexShrink:0 }}>
                <div style={{ position:"relative", overflow:"hidden", width:20, height:20, flexShrink:0 }}>
                  <div style={{ position:"absolute", top:"18.75%", right:"25.01%", bottom:"18.75%", left:"24.99%" }}>
                    <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgTblFilter} />
                  </div>
                </div>
                <span style={{ fontSize:14, fontWeight:600, color:"#0e0f10", whiteSpace:"nowrap" }}>{filtersCollapsed ? "Show Filters" : "Hide Filters"}</span>
                {false && (
                  <div style={{ background:"#dfe3e5", borderRadius:9999, minWidth:20, width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <span style={{ fontSize:14, fontWeight:700, color:"#4e5a63", lineHeight:"20px" }}>1</span>
                  </div>
                )}
              </button>
              {/* Edit Columns */}
              <div ref={editColsRef} style={{ position:"relative", flexShrink:0 }}>
                <button onClick={() => setShowEditCols(v => !v)}
                  style={{ display:"flex", alignItems:"center", gap:4, height:36, padding:"0 10px", borderRadius:8, border:"1px solid #818d96", background: showEditCols ? "#f7f8f8" : "white", cursor:"pointer", fontFamily:"inherit" }}>
                  <div style={{ position:"relative", overflow:"hidden", width:20, height:20, flexShrink:0 }}>
                    <div style={{ position:"absolute", top:"16.66%", right:"16.67%", bottom:"16.67%", left:"16.66%" }}>
                      <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgTblColumns} />
                    </div>
                  </div>
                  <span style={{ fontSize:14, fontWeight:600, color:"#0e0f10", whiteSpace:"nowrap" }}>Edit Columns</span>
                </button>
                {showEditCols && (
                  <EditColumnsDropdown
                    visibleCols={visibleCols}
                    onChange={handleColChange}
                    onReset={handleColReset}
                  />
                )}
              </div>
              {/* Selected count */}
              {anySelected && (
                <div style={{ display:"flex", alignItems:"center", gap:16, paddingLeft:12, flexShrink:0 }}>
                  <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap" }}>
                    <strong style={{ fontWeight:700 }}>{selectedCount.toLocaleString()}</strong>
                    <span style={{ fontWeight:400 }}> Selected</span>
                  </span>
                  {!allSelected && (
                    <>
                      <div style={{ width:1, height:16, background:"#dfe3e5", flexShrink:0 }} />
                      <button onClick={() => { setAllSelected(true); setSelectedRows(new Set(TABLE_ROWS.map((_,i)=>i))); }}
                        style={{ background:"none", border:"none", padding:0, fontSize:14, lineHeight:"20px", color:"#0056ce", cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>
                        Select All {TOTAL_RECORDS.toLocaleString()} Records
                      </button>
                    </>
                  )}
                  <div style={{ width:1, height:16, background:"#dfe3e5", flexShrink:0 }} />
                  <button onClick={() => { setAllSelected(false); setSelectedRows(new Set()); }}
                    style={{ background:"none", border:"none", padding:0, fontSize:14, lineHeight:"20px", color:"#0056ce", cursor:"pointer", fontFamily:"inherit", whiteSpace:"nowrap" }}>
                    Clear Selection
                  </button>
                </div>
              )}
              <div style={{ flex:1 }} />
              {/* Credit Usage Bar */}
              <div style={{ display:"flex", alignItems:"center", gap:4, background:"#f2f6fa", borderRadius:8, padding:"8px 16px", flexShrink:0, height:36, boxSizing:"border-box" }}>
                <div style={{ width:100, height:6, display:"flex", borderRadius:9999, overflow:"hidden", flexShrink:0 }}>
                  <div style={{ flex:1, background:"linear-gradient(-17.5deg,#0056ce 10%,#6534ce 89%)", borderRadius:9999 }} />
                  <div style={{ flex:1, background:"#add3ff", borderRadius:"0 9999px 9999px 0" }} />
                </div>
                <span style={{ fontSize:12, color:"#0056ce", letterSpacing:"0.24px", whiteSpace:"nowrap" }}>
                  <strong style={{ fontWeight:700 }}>250</strong>
                  <span style={{ fontWeight:500 }}> / 500 Credits</span>
                </span>
              </div>
              {/* Export */}
              <button style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:4, height:36, padding:"0 10px", width:120, borderRadius:8, border:"none", background:"#0056ce", cursor:"pointer", opacity: anySelected ? 1 : 0.5, fontFamily:"inherit", flexShrink:0 }}>
                <div style={{ position:"relative", overflow:"hidden", width:20, height:20, flexShrink:0 }}>
                  <div style={{ position:"absolute", top:"12.5%", right:"12.5%", bottom:"12.5%", left:"12.5%" }}>
                    <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgTblDownload} />
                  </div>
                </div>
                <span style={{ fontSize:14, fontWeight:600, color:"white", whiteSpace:"nowrap" }}>Export</span>
              </button>
            </div>

            {/* Scrollable table area */}
            <div style={{ flex:1, overflowX:"auto", overflowY:"auto" }}>
              {/* Fixed-width inner table */}
              {(() => {
                const totalWidth = 44 + activeCols.reduce((s,c) => s+c.width, 0);
                const colStyle = { background:"#eff1f2", display:"flex", alignItems:"center", padding:"8px 12px", height:"100%", flexShrink:0, boxSizing:"border-box" };
                const cellStyle = { display:"flex", alignItems:"center", padding:"8px 12px", height:"100%", flexShrink:0, boxSizing:"border-box", borderRight:"1px solid #eff1f2" };
                return (
                  <div style={{ width:totalWidth }}>
                    {/* Sticky header */}
                    <div style={{ display:"flex", height:36, position:"sticky", top:0, zIndex:2, flexShrink:0, borderBottom:"1px solid #dfe3e5" }}>
                      <div style={{ ...colStyle, width:44, cursor:"pointer" }} onClick={() => {
                          const pageAllSelected = TABLE_ROWS.every((_, i) => selectedRows.has(i));
                          setAllSelected(false);
                          setSelectedRows(pageAllSelected ? new Set() : new Set(TABLE_ROWS.map((_, i) => i)));
                        }}>
                        {(() => {
                          const pageAllSelected = TABLE_ROWS.length > 0 && TABLE_ROWS.every((_, i) => selectedRows.has(i));
                          const someSelected = !pageAllSelected && TABLE_ROWS.some((_, i) => selectedRows.has(i));
                          const allSelected = pageAllSelected;
                          return allSelected
                            ? <div style={{ width:16, height:16, borderRadius:3, background:"#0056ce", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                              </div>
                            : someSelected
                            ? <div style={{ width:16, height:16, border:"2px solid #0056ce", borderRadius:3, background:"white", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                                <div style={{ width:8, height:2, background:"#0056ce", borderRadius:1 }} />
                              </div>
                            : <div style={{ width:16, height:16, border:"2px solid #a0aab0", borderRadius:3, background:"white", flexShrink:0 }} />;
                        })()}
                      </div>
                      {activeCols.map(col => (
                        <div key={col.key} style={{ ...colStyle, width:col.width }}>
                          <span style={{ fontSize:12, fontWeight:600, color:"#0e0f10", letterSpacing:"0.24px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{col.label}</span>
                        </div>
                      ))}
                    </div>

                    {/* Data rows */}
                    {TABLE_ROWS.map((row, ri) => {
                      const isSelected = selectedRows.has(ri);
                      const isHovered  = hoveredRow === ri && !isSelected;
                      const rowBg      = isSelected ? "#f5f9ff" : isHovered ? "#f7f8f8" : "white";
                      return (
                      <div key={ri}
                        style={{ display:"flex", height:52, borderBottom:"1px solid #eff1f2", background:rowBg, cursor:"pointer" }}
                        onMouseEnter={() => setHoveredRow(ri)}
                        onMouseLeave={() => setHoveredRow(null)}
                        onClick={() => toggleRow(ri)}>
                        {/* Checkbox */}
                        <div style={{ ...cellStyle, width:44, borderRight:"1px solid #eff1f2", background:"transparent" }}>
                          {isSelected
                            ? <div style={{ width:16, height:16, borderRadius:3, background:"#0056ce", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center" }}>
                                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                              </div>
                            : <div style={{ width:16, height:16, border:"2px solid #a0aab0", borderRadius:3, background:"white", flexShrink:0 }} />
                          }
                        </div>
                        {activeCols.map(col => {
                          const isOwners    = col.key === "owners";
                          const isResidents = col.key === "residents";
                          const isPropType  = col.key === "propType";
                          const isOwnerType = col.key === "ownerType";
                          const count       = isOwners ? row.ownerCount : isResidents ? row.resCount : 0;
                          return (
                            <div key={col.key} style={{ ...cellStyle, width:col.width, gap: (isOwners||isResidents)?4:0 }}>
                              {isPropType ? (
                                <div style={{ display:"flex", flexDirection:"column", width:"100%" }}>
                                  <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{row.propType}</span>
                                  <span style={{ fontSize:12, lineHeight:"16px", color:"#4e5a63", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{row.propSubtype}</span>
                                </div>
                              ) : isOwnerType ? (
                                <div style={{ background:"#f5f2ff", borderRadius:99, height:20, display:"flex", alignItems:"center", padding:"0 8px", flexShrink:0 }}>
                                  <span style={{ fontSize:12, fontWeight:500, color:"#6534ce", letterSpacing:"0.24px", whiteSpace:"nowrap" }}>Individual</span>
                                </div>
                              ) : (isOwners || isResidents) ? (
                                <>
                                  <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#0e0f10", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", filter:"blur(4px)" }}>{isOwners ? row.owners : row.residents}</span>
                                  {count > 0 && (
                                    <div className="count-tag-wrap">
                                      <div className="count-tag-tooltip">Export to view full contact details</div>
                                      <div style={{ background:"#dfe3e5", borderRadius:9999, height:20, minWidth:20, display:"flex", alignItems:"center", gap:4, padding:"0 8px", flexShrink:0 }}>
                                        <div style={{ position:"relative", overflow:"hidden", width:12, height:12, flexShrink:0 }}>
                                          <div style={{ position:"absolute", top:"8.33%", right:"16.67%", bottom:"8.33%", left:"8.33%" }}>
                                            <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgTblUser} />
                                          </div>
                                        </div>
                                        <span style={{ fontSize:12, fontWeight:600, color:"#4e5a63", letterSpacing:"0.24px" }}>{count}</span>
                                      </div>
                                    </div>
                                  )}
                                </>
                              ) : (
                                <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#0e0f10", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{row[col.key]}</span>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )})}
                  </div>
                );
              })()}
            </div>

            {/* Pagination bar — 52px */}
            <div style={{ display:"flex", alignItems:"center", gap:16, padding:"8px 24px", height:52, flexShrink:0, borderTop:"1px solid #dfe3e5", background:"white" }}>
              {/* Prev */}
              <button onClick={() => setCurrentPage(p => Math.max(p - 1, 1))} disabled={currentPage === 1} style={{ display:"flex", alignItems:"center", gap:8, background:"none", border:"none", cursor: currentPage === 1 ? "default" : "pointer", padding:0, fontFamily:"inherit", opacity: currentPage === 1 ? 0.35 : 1 }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                <span style={{ fontSize:16, fontWeight:600, color:"#0e0f10", whiteSpace:"nowrap" }}>Prev</span>
              </button>
              {/* Page selector */}
              <div ref={pageRef} style={{ position:"relative" }}>
                <div onClick={() => setPageDropOpen(o => !o)} style={{ display:"flex", alignItems:"center", gap:4, height:36, padding:"0 10px", borderRadius:8, border:"1px solid #818d96", background:"white", cursor:"pointer", minWidth:68 }}>
                  <span style={{ flex:1, fontSize:14, fontWeight:600, color:"#0e0f10" }}>{currentPage}</span>
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d={pageDropOpen ? "M5 12.5l5-5 5 5" : "M5 7.5l5 5 5-5"} stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                </div>
                {pageDropOpen && (
                  <div style={{ position:"absolute", bottom:"calc(100% + 4px)", left:0, background:"white", border:"1px solid #c0c6cb", borderRadius:8, boxShadow:"0 4px 12px rgba(0,0,0,0.12)", zIndex:50, maxHeight:200, overflowY:"auto", minWidth:"100%" }}>
                    {Array.from({ length: TOTAL_PAGES }, (_, i) => i + 1).map(p => (
                      <div key={p} onClick={() => { setCurrentPage(p); setPageDropOpen(false); }}
                        style={{ padding:"8px 16px", fontSize:14, color:"#0e0f10", fontWeight: p === currentPage ? 600 : 400, cursor:"pointer", background: p === currentPage ? "#f7f8f8" : "transparent", whiteSpace:"nowrap" }}
                        onMouseEnter={e => { e.currentTarget.style.background = "#f7f8f8"; }}
                        onMouseLeave={e => { e.currentTarget.style.background = p === currentPage ? "#f7f8f8" : "transparent"; }}>
                        {p}
                      </div>
                    ))}
                  </div>
                )}
              </div>
              {/* Next */}
              <button onClick={() => setCurrentPage(p => Math.min(p + 1, TOTAL_PAGES))} style={{ display:"flex", alignItems:"center", gap:8, background:"none", border:"none", cursor:"pointer", padding:0, fontFamily:"inherit" }}>
                <span style={{ fontSize:16, fontWeight:600, color:"#0e0f10", whiteSpace:"nowrap" }}>Next</span>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
              {/* Count */}
              <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap" }}>{((currentPage-1)*PAGE_SIZE+1).toLocaleString()} - {Math.min(currentPage*PAGE_SIZE, TOTAL_RECORDS).toLocaleString()} of {TOTAL_RECORDS.toLocaleString()}</span>
            </div>

          </div>
        </div>
      );
    }

    // ── Home section (empty / cleared state) ─────────────────────────────────
    const RECENT_SEARCHES = [
      { id:1, title:"Phoenix · Single Family · 4+ Beds",        time:"yesterday", results:"405 results" },
      { id:2, title:"Scottsdale · Condo · 2 Beds · 2 Baths",    time:"yesterday", results:"405 results" },
      { id:3, title:"Mesa · Multi-Family · Tax Delinquent",      time:"yesterday", results:"405 results" },
      { id:4, title:"Phoenix · Single Family · 4+ Beds",        time:"yesterday", results:"405 results" },
      { id:5, title:"Phoenix · Single Family · 4+ Beds",        time:"yesterday", results:"405 results" },
    ];
    const FILTER_PILLS = ["Owner-Occupied","$250K-$400K","5+ years owned","Built after 2000+","other filters sele..."];
    const SAVED_FILTERS_DATA = [
      { id:1, title:"Pasadena property list", results:"2,428 results" },
      { id:2, title:"Pasadena property list", results:"2,428 results" },
      { id:3, title:"Pasadena property list", results:"2,428 results" },
    ];
    const imgSavedBookmark = "https://www.figma.com/api/mcp/asset/f9100f9b-3ac0-4535-9404-f76317abcd99";

    function FilterPillsRow() {
      return (
        <div style={{ display:"flex", gap:8, alignItems:"center", width:"100%", flexWrap:"nowrap", overflow:"hidden" }}>
          {FILTER_PILLS.map((part, idx) => (
            <React.Fragment key={idx}>
              {idx > 0 && <span style={{ width:2, height:2, background:"#4e5a63", borderRadius:"50%", flexShrink:0, display:"inline-block" }} />}
              <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:14, lineHeight:"20px", color:"#4e5a63", maxWidth:200, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flexShrink: idx === FILTER_PILLS.length-1 ? 1 : 0 }}>{part}</span>
            </React.Fragment>

          <div style={{ border:"1px solid #c0c6cb", borderRadius:4, padding:"2px 8px", display:"flex", alignItems:"flex-start", flexShrink:0, overflow:"hidden" }}>
            <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>+5</span>
          </div>
        </div>
      );
    }

    function RecentSearchItem({ item }) {
      const [hovered, setHovered] = useState(false);
      return (
        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{ display:"flex", gap:4, alignItems:"flex-start", padding:"12px", borderRadius:8, background:hovered?"#f7f8f8":"transparent", cursor:"pointer" }}
        >
          {/* Left icon: clock or arrow */}
          <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            {hovered ? (
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            ) : (
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6.17" stroke="#4e5a63" strokeWidth="1.5"/>
                <path d="M8 5v3.2l2 1.4" stroke="#4e5a63" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>

          </div>
          {/* Content */}
          <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", gap:4 }}>
            {/* Title row */}
            <div style={{ display:"flex", gap:8, alignItems:"center", width:"100%" }}>
              <span style={{ fontFamily:"Inter, sans-serif", fontWeight:600, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap", flexShrink:0 }}>{item.title}</span>
              <div style={{ display:"flex", gap:4, alignItems:"center", flex:1, minWidth:0 }}>
                <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>{item.time}</span>
                <span style={{ width:2, height:2, background:"#4e5a63", borderRadius:"50%", flexShrink:0, display:"inline-block" }} />
                <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>{item.results}</span>
              </div>
              {/* Bookmark */}
              <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <div style={{ position:"relative", width:16, height:16, flexShrink:0 }}>
                  <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src="https://www.figma.com/api/mcp/asset/3538ef86-6a0f-4574-8234-e31191c29b2d" />
                </div>
              </div>
            </div>
            {/* Filter tags row */}
            <FilterPillsRow />
          </div>
        </div>
      );
    }

    function SavedFilterItem({ item }) {
      const [hovered, setHovered] = useState(false);
      return (
        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{ display:"flex", gap:4, alignItems:"flex-start", padding:"12px", borderRadius:8, background:hovered?"#f7f8f8":"transparent", cursor:"pointer" }}
        >
          {/* Left icon: bookmark or arrow */}
          <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            {hovered ? (
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            ) : (
              <div style={{ overflow:"hidden", position:"relative", width:16, height:16, flexShrink:0 }}>
                <div style={{ position:"absolute", top:"12.5%", right:"20.83%", bottom:"12.5%", left:"20.83%" }}>
                  <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgSavedBookmark} />
                </div>
              </div>
            )}
          </div>
          {/* Content */}
          <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", gap:4 }}>
            {/* Title row */}
            <div style={{ display:"flex", gap:8, alignItems:"center", width:"100%" }}>
              <span style={{ fontFamily:"Inter, sans-serif", fontWeight:600, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap", flexShrink:0 }}>{item.title}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>{item.results}</span>
              </div>
              {/* 3-dot menu */}
              <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="3" r="1.5" fill="#4e5a63"/>
                  <circle cx="8" cy="8" r="1.5" fill="#4e5a63"/>
                  <circle cx="8" cy="13" r="1.5" fill="#4e5a63"/>
                </svg>
              </div>
            </div>
            {/* Filter tags row */}
            <FilterPillsRow />
          </div>
        </div>
      );
    }

    function HomeSection() {
      const [activeTab, setActiveTab] = useState("recent");
      return (
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", background:"white", overflowY:"auto", paddingTop:150, paddingBottom:24, paddingLeft:24, paddingRight:24, gap:32 }}>
          {/* Title + description */}
          <div style={{ display:"flex", flexDirection:"column", gap:8, alignItems:"center", maxWidth:600, width:"100%", textAlign:"center" }}>
            <p style={{ fontFamily:"Inter, sans-serif", fontWeight:600, fontSize:24, lineHeight:"28px", letterSpacing:"-0.2px", color:"#0e0f10", margin:0 }}>
              Start your search to build a list
            </p>
            <p style={{ fontFamily:"Helvetica, sans-serif", fontWeight:400, fontSize:14, lineHeight:"20px", color:"#0e0f10", margin:0 }}>
              Over <strong style={{ fontWeight:700 }}>1.4B</strong> B2B Contacts and <strong style={{ fontWeight:700 }}>125M</strong> Properties researched in real-time with the power of AI.
            </p>
          </div>
          {/* Recently Searched card */}
          <div style={{ border:"1px solid #dfe3e5", borderRadius:8, display:"flex", flexDirection:"column", paddingBottom:16, paddingTop:12, paddingLeft:16, paddingRight:16, width:700, flexShrink:0, gap:20 }}>
            {/* Tabs */}
            <div style={{ borderBottom:"1px solid #dfe3e5", display:"flex", gap:20, marginBottom:-1 }}>
              <div onClick={() => setActiveTab("recent")} style={{ borderBottom: activeTab==="recent" ? "2px solid #00132d" : "2px solid transparent", padding:"8px 0", cursor:"pointer" }}>
                <span style={{ fontFamily:"Inter, sans-serif", fontWeight: activeTab==="recent" ? 600 : 500, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap" }}>Recently Searched</span>
              </div>
              <div onClick={() => setActiveTab("saved")} style={{ borderBottom: activeTab==="saved" ? "2px solid #00132d" : "2px solid transparent", padding:"8px 0", cursor:"pointer", display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ fontFamily:"Inter, sans-serif", fontWeight: activeTab==="saved" ? 600 : 500, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap" }}>Saved Filters</span>
                <div style={{ background:"#dfe3e5", borderRadius:9999, width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <span style={{ fontFamily:"Helvetica, sans-serif", fontWeight:700, fontSize:12, lineHeight:"20px", color:"#4e5a63", textAlign:"center" }}>3</span>
                </div>
              </div>
            </div>
            {/* Items */}
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              {(activeTab === "recent" ? RECENT_SEARCHES : SAVED_FILTERS_DATA).map((item, i) => (
                <React.Fragment key={item.id}>
                  {i > 0 && <div style={{ padding:"0 12px" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>}
                  {activeTab === "recent" ? <RecentSearchItem item={item} /> : <SavedFilterItem item={item} />}
                </React.Fragment>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState("landing"); // "landing" | "table" | "home"
      const [filtersCollapsed, setFiltersCollapsed] = useState(false);
      return (
        <div style={{ background:"white", display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden" }}>
          <Header />
          <div style={{ display:"flex", flex:1, alignItems:"stretch", minHeight:0 }}>
            <Sidebar />
            <FiltersPanel
              onSearch={() => setView("table")}
              onClear={() => setView("home")}
              collapsed={filtersCollapsed}
              onCollapseChange={setFiltersCollapsed}
            />
            {view === "table"
              ? <MainSection filtersCollapsed={filtersCollapsed} onToggleFilters={() => setFiltersCollapsed(v => !v)} />
              : view === "home" ? <HomeSection /> : <LandingSection />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
