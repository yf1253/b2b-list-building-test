    .toggle-btn:hover { background: #f7f8f8 !important; }
    .who-contact-btn:hover { background: #f7f8f8 !important; }

    /* Toggle switch states */
    /* Radius slider tooltip */
    .radius-tooltip { pointer-events: none; }

    .spk-toggle { cursor: pointer; }
    .spk-toggle .spk-toggle-track { transition: background 0.15s; }
    .spk-toggle.off .spk-toggle-track  { background: #a0aab0; }
    .spk-toggle.on  .spk-toggle-track  { background: #0056ce; }
    .spk-toggle.off:hover .spk-toggle-track  { background: #818d96; }
    .spk-toggle.on:hover  .spk-toggle-track  { background: #0045a6; }
    .spk-toggle.off:active .spk-toggle-track { background: #61717c; }
    .spk-toggle.on:active  .spk-toggle-track { background: #003987; }
    .spk-toggle:focus-visible { outline: none; }
    .spk-toggle:focus-visible .spk-toggle-track { outline: 2px solid #0056ce; outline-offset: 2px; border-radius: 100px; }
    .spk-toggle.disabled { opacity: 0.5; pointer-events: none; }
    .spk-toggle .spk-toggle-knob { transition: left 0.15s; }
    .who-contact-icon-active   { filter: brightness(0) saturate(100%) invert(16%) sepia(94%) saturate(1600%) hue-rotate(210deg) brightness(85%); }
    .who-contact-icon-inactive { filter: brightness(0) saturate(100%) invert(35%) sepia(10%) saturate(400%) hue-rotate(170deg) brightness(90%); }
    .ms-include { color: #0e0f10; }
    .ms-include:hover, .ms-include.active { color: #0056CE !important; }
    .ms-exclude { color: #0e0f10; }
    .ms-exclude:hover, .ms-exclude.active { color: #CB3030 !important; }
    .ms-include.active, .ms-exclude.active { font-weight: 600; }

    .filter-tag {
      position: relative; display: inline-flex; align-items: center;
      height: 24px; padding: 0 8px; border-radius: 4px;
      max-width: 120px; overflow: hidden; cursor: default;
    }
    .filter-tag-include { background: #edf5ff; }
    .filter-tag-exclude { background: #ffecec; }
    .filter-tag .tag-text {
      font-size: 12px; font-weight: 400; line-height: 16px; font-family: Helvetica, sans-serif;
      letter-spacing: 0.24px; color: #0e0f10; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .filter-tag .tag-close {
      display: none; position: absolute; right: 0; top: 0; bottom: 0;
      width: 24px; align-items: center; justify-content: center;
      cursor: pointer; z-index: 2;
    }
    .filter-tag .tag-fade {
      display: none; position: absolute; right: 24px; top: 0; bottom: 0;
      width: 20px; pointer-events: none; z-index: 2;
    }
    .filter-tag-include .tag-fade { background: linear-gradient(to right, transparent, #edf5ff); }
    .filter-tag-exclude .tag-fade { background: linear-gradient(to right, transparent, #ffecec); }
    .filter-tag-include .tag-close { background: #edf5ff; }
    .filter-tag-exclude .tag-close { background: #ffecec; }
    .filter-tag:hover .tag-close { display: flex; }
    .filter-tag:hover .tag-fade { display: block; }
    @keyframes toastSlideIn {
      from { transform: translateY(calc(100% + 30px)); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastSlideOut {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(calc(100% + 30px)); opacity: 0; }
    }
    .toast-enter { animation: toastSlideIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .toast-exit  { animation: toastSlideOut 0.25s ease-in forwards; }
    .count-tag-wrap { position: relative; display: inline-flex; flex-shrink: 0; }
    .count-tag-tooltip {
      display: none; position: absolute; bottom: calc(100% + 12px); left: 50%; transform: translateX(-50%);
      background: #4e5a63; border-radius: 4px; padding: 8px;
      white-space: nowrap; font-size: 12px; color: white; font-family: Helvetica, sans-serif;
      line-height: 16px; z-index: 100; pointer-events: none;
    }
    .count-tag-tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%) rotate(45deg);
      width: 8px; height: 8px; background: #4e5a63; margin-top: -4px;
    }
    .count-tag-wrap:hover .count-tag-tooltip { display: block; }
    .copy-icon-wrap { position: relative; display: inline-flex; flex-shrink: 0; cursor: pointer; }
    .copy-icon-tip {
      display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #4e5a63; border-radius: 4px; padding: 3px 8px;
      white-space: nowrap; font-size: 12px; color: white; font-family: Helvetica, sans-serif;

    }
    .copy-icon-tip::after {

      width: 6px; height: 6px; background: #4e5a63; margin-top: -3px;
    }
    .copy-icon-wrap:hover .copy-icon-tip { display: block; }
    .edit-col-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .edit-col-scroll::-webkit-scrollbar { display: none; }

    // ── Logo ─────────────────────────────────────────────────────────────────
    function LogoBusiness() {
      return (
        <div style={{ height:25, flexShrink:0, width:196 }}>
          <img alt="Spokeo Business" style={{ display:"block", width:"100%", height:"100%" }} src={imgLogo} />
        </div>
      );
    }

    // ── Avatar Icon ───────────────────────────────────────────────────────────
    function InitialMenuIcon() {
      return (
        <div style={{ height:28, position:"relative", width:32, flexShrink:0 }}>
          <div style={{ position:"absolute", left:0, top:0, width:28, height:28 }}>
            <img alt="" style={{ position:"absolute", display:"block", maxWidth:"none", width:"100%", height:"100%" }} src={imgHeaderBgCircle} />
          </div>
          <div style={{ position:"absolute", left:"calc(50% - 2px)", top:"50%", transform:"translate(-50%,-50%)", display:"flex", flexDirection:"column", justifyContent:"center", textAlign:"center" }}>
            <p style={{ fontWeight:700, fontSize:14, lineHeight:"20px", letterSpacing:"0.14px", background:"linear-gradient(to right, #1370f3, #003987)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", margin:0 }}>S</p>
          </div>
          <div style={{ position:"absolute", top:"65.72%", right:"6.24%", bottom:"9.64%", left:"68.76%" }}>
            <img alt="" style={{ position:"absolute", display:"block", maxWidth:"none", width:"100%", height:"100%" }} src={imgHeaderMenu} />
          </div>
        </div>
      );
    }

    // ── Badge ─────────────────────────────────────────────────────────────────
    function Badge({ label = "New" }) {
      return (
        <div style={{ background:"#0056ce", display:"flex", height:16, alignItems:"center", justifyContent:"center", padding:"0 4px", borderRadius:4, flexShrink:0 }}>
          <span style={{ fontWeight:700, fontSize:12, lineHeight:"16px", color:"white", whiteSpace:"nowrap" }}>{label}</span>
        </div>
      );
    }

    // ── Header ────────────────────────────────────────────────────────────────
    function Header() {
      return (
        <header style={{
          background:"white", display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"12px 16px", flexShrink:0, width:"100%", position:"relative", zIndex:10,
          boxShadow:"0 0 2px rgba(0,0,0,0.12), 0 8px 16px rgba(0,0,0,0.12)",
          boxSizing:"border-box"

    function FilterSelectField({ placeholder = "Select all that apply", options = [], dataKey, dataLabel }) {
      const [open, setOpen] = useState(false);
      const [value, setValue] = useState(null);
      const ref = useRef(null);
      const ctx = useContext(FilterSectionContext);
      const globalCtx = useContext(GlobalFilterContext);

      useEffect(() => {
        if (dataKey) globalCtx?.registerData(dataKey, null);
      }, []);

      useEffect(() => {
        function handleClick(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      // Reset when section clears
      useEffect(() => {
        if (ctx?.resetKey > 0) {
          setValue(null);
          setOpen(false);
          if (dataKey) globalCtx?.registerData(dataKey, null);
        }
      }, [ctx?.resetKey]);

      const isFilled = value !== null;
      const border = isFilled ? "1px solid #818d96" : "1px solid #c0c6cb";

      function handleSelect(opt) {
        if (!isFilled) ctx?.register(1);
        setValue(opt);
        setOpen(false);
        if (dataKey) globalCtx?.registerData(dataKey, { label: dataLabel || placeholder, tags: [{ text: opt, type: "include" }] });
      }
      function handleClear(e) {
        e.stopPropagation();
        if (isFilled) ctx?.register(-1);
        setValue(null);
        setOpen(false);
        if (dataKey) globalCtx?.registerData(dataKey, null);
      }

      return (
        <div ref={ref} style={{ position:"relative", width:"100%" }}>
          <div onClick={() => setOpen(o => !o)}
            style={{ background:"white", border, borderRadius:8, display:"flex", gap:4,
                     height:36, alignItems:"center", padding:"0 8px 0 16px", cursor:"pointer" }}>
            <span style={{ flex:1, fontSize:14, lineHeight:"20px",
                           color: isFilled ? "#0e0f10" : "#4e5a63",
                           overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {isFilled ? value : placeholder}
            </span>
            {isFilled
              ? <div onClick={handleClear}
                  style={{ width:20, height:20, cursor:"pointer", flexShrink:0 }}>
                  <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" fill="#818d96"/><path d="M7.5 7.5l5 5M12.5 7.5l-5 5" stroke="white" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </div>
              : <FilterArrow up={open} />
            }
          </div>
          {open && options.length > 0 && (
            <div style={{ position:"absolute", top:44, left:0, right:0, zIndex:10,
                          background:"white", borderRadius:8, padding:"8px 0",
                          boxShadow:"0 12px 24px rgba(0,0,0,0.12), 0 0 2px rgba(0,0,0,0.12)",
                          maxHeight:320, overflowY:"auto" }}>
              {options.map(opt => (
                <div key={opt} onClick={() => handleSelect(opt)}
                  style={{ padding:"10px 16px", fontSize:14, lineHeight:"20px",
                           color:"#0e0f10", cursor:"pointer" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f7f8f8"}
                  onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                  {opt}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function FilterLabeledSelect({ label, placeholder, options = [] }) {
      const ctx = useContext(FilterSectionContext);
      const dataKey = (ctx?.title || "filter") + ":" + (label || placeholder || "select");
      return (

        </div>
      );
    }

    function FilterMultiSelect({ label, placeholder = "Select all that apply", options = [] }) {
      const [open, setOpen] = useState(false);
      const [selections, setSelections] = useState({});
      const ref = useRef(null);
      const ctx = useContext(FilterSectionContext);
      const globalCtx = useContext(GlobalFilterContext);
      const prevCountRef = useRef(0);
      const dataKey = (ctx?.title || "filter") + ":" + (label || "main");

      useEffect(() => {
        globalCtx?.registerData(dataKey, null);
      }, []);

      useEffect(() => {
        function handleClick(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener("mousedown", handleClick);
        return () => document.removeEventListener("mousedown", handleClick);
      }, []);

      useEffect(() => {
        if (ctx?.resetKey > 0) {
          setSelections({});
          setOpen(false);
          prevCountRef.current = 0;
          globalCtx?.registerData(dataKey, null);
        }
      }, [ctx?.resetKey]);

      const selectedCount = Object.values(selections).filter(Boolean).length;

      useEffect(() => {
        const prev = prevCountRef.current;
        const delta = selectedCount - prev;
        if (delta !== 0) ctx?.register(delta);
        prevCountRef.current = selectedCount;
        const entries = Object.entries(selections).filter(([, v]) => v);
        if (entries.length > 0) {
          globalCtx?.registerData(dataKey, {
            label: label || ctx?.title || "Filter",
            tags: entries.map(([opt, type]) => ({ text: opt, type }))
          });
        } else {
          globalCtx?.registerData(dataKey, null);
        }
      }, [selectedCount, selections]);

      function handleToggle(opt, type, e) {
        e.stopPropagation();
        setSelections(prev => {
          const next = { ...prev };
          if (next[opt] === type) { delete next[opt]; } else { next[opt] = type; }
          return next;
        });
      }

      const selectedEntries = Object.entries(selections).filter(([, v]) => v);

      function handleRemoveTag(opt, e) {
        e.stopPropagation();
        setSelections(prev => { const next = { ...prev }; delete next[opt]; return next; });
      }

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
          {label && <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>{label}</span>}

          {/* Tags */}
          {selectedEntries.length > 0 && (
            <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
              {selectedEntries.map(([opt, type]) => (
                <div key={opt} className={`filter-tag filter-tag-${type}`}>
                  <span className="tag-text">{opt}</span>
                  <span className="tag-fade" />
                  <span className="tag-close" onClick={e => handleRemoveTag(opt, e)}>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                      <path d="M1 1L9 9M9 1L1 9" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                  </span>
                </div>
              ))}
            </div>
          )}

          <div ref={ref} style={{ position:"relative", width:"100%" }}>
            <div onClick={() => setOpen(o => !o)}
              style={{ background:"white", border:"1px solid #c0c6cb", borderRadius:8, display:"flex", gap:4,
                       height:36, alignItems:"center", padding:"0 8px 0 16px", cursor:"pointer" }}>
              <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#4e5a63",
                             overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                {placeholder}
              </span>
              <FilterArrow up={open} />
            </div>
            {open && options.length > 0 && (
              <div style={{ position:"absolute", top:44, left:0, right:0, zIndex:10,
                            background:"white", borderRadius:8, padding:"8px 0",
                            boxShadow:"0 12px 24px rgba(0,0,0,0.12), 0 0 2px rgba(0,0,0,0.12)",
                            maxHeight:320, overflowY:"auto" }}>
                {options.map(opt => {
                  const sel = selections[opt];
                  const isIncludeActive = sel === "include";
                  const isExcludeActive = sel === "exclude";
                  return (
                    <div key={opt}
                      style={{ display:"flex", alignItems:"center", height:40, padding:"0 16px", gap:4 }}
                      onMouseEnter={e => e.currentTarget.style.background = "#f7f8f8"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <span style={{ flex:1, fontSize:14, lineHeight:"20px",

                      <div style={{ display:"flex", alignItems:"center", gap:12, flexShrink:0 }}>
                        <span onClick={!isIncludeActive ? e => handleToggle(opt, "include", e) : undefined}
                          className="ms-include"
                          style={{ fontSize:12, lineHeight:"16px", whiteSpace:"nowrap",
                                   cursor: isIncludeActive ? "default" : "pointer",
                                   opacity: isIncludeActive ? 0.3 : 1,
                                   pointerEvents: isIncludeActive ? "none" : "auto" }}>Include</span>
                        <span style={{ width:1, height:16, background:"#c0c6cb", display:"inline-block", flexShrink:0 }} />
                        <span onClick={!isExcludeActive ? e => handleToggle(opt, "exclude", e) : undefined}
                          className="ms-exclude"
                          style={{ fontSize:12, lineHeight:"16px", whiteSpace:"nowrap",
                                   cursor: isExcludeActive ? "default" : "pointer",
                                   opacity: isExcludeActive ? 0.3 : 1,
                                   pointerEvents: isExcludeActive ? "none" : "auto" }}>Exclude</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function FilterLabeledText({ label, placeholder }) {

    function FilterToggleGroup({ label, options }) {
      const opts = options || ["Any","Include","Exclude"];
      const [val, setVal] = useState(opts[0]);
      const ctx = useContext(FilterSectionContext);
      const globalCtx = useContext(GlobalFilterContext);
      const dataKey = (ctx?.title || "filter") + ":" + (label || "togglegroup");

      useEffect(() => {
        globalCtx?.registerData(dataKey, null);
      }, []);

      // Reset when section clears
      useEffect(() => {
        if (ctx?.resetKey > 0) {
          setVal(opts[0]);
          globalCtx?.registerData(dataKey, null);
        }
      }, [ctx?.resetKey]);

      function handleSelect(opt) {
        const wasDefault = val === opts[0];
        const isDefault = opt === opts[0];
        if (wasDefault && !isDefault) ctx?.register(1);
        if (!wasDefault && isDefault) ctx?.register(-1);
        setVal(opt);
        if (!isDefault) {
          globalCtx?.registerData(dataKey, { label, tags: [{ text: opt, type: opt === "Exclude" ? "exclude" : "include" }] });
        } else {
          globalCtx?.registerData(dataKey, null);
        }

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:8, width:"100%" }}>
          <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>{label}</span>

                  fontWeight: 400,
                  color: val === opt ? (opt === "Exclude" ? "#9c2424" : "#003987") : "#0e0f10",

    function FilterCheckbox({ label }) {
      const [checked, setChecked] = useState(false);
      const ctx = useContext(FilterSectionContext);
      const globalCtx = useContext(GlobalFilterContext);
      const prevRef = useRef(false);
      const dataKey = (ctx?.title || "filter") + ":" + label;
      useEffect(() => {

      }, []);
      useEffect(() => {
        if (checked && !prevRef.current) {
          ctx?.register(1);
          globalCtx?.registerData(dataKey, { label, tags: [] });
        }
        if (!checked && prevRef.current) {
          ctx?.register(-1);
          globalCtx?.registerData(dataKey, null);
        }
        prevRef.current = checked;
      }, [checked]);
      return (
        <div style={{ display:"flex", alignItems:"center", gap:8, width:"100%" }}>
          <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>{label}</span>
          <Toggle checked={checked} onChange={setChecked} />
        </div>
      );
    }

    function FilterSection({ title, children, defaultOpen = false, required = false }) {
      const [open, setOpen] = useState(defaultOpen);
      const [hovered, setHovered] = useState(false);
      const [count, setCount] = useState(0);
      const [resetKey, setResetKey] = useState(0);
      const headerBg = (open || hovered) ? "#f7f8f8" : "white";
      const globalCtx = useContext(GlobalFilterContext);

      const register = useCallback((delta) => {
        setCount(c => Math.max(0, c + delta));
        globalCtx?.register(delta);
      }, [globalCtx]);

      function handleClear(e) {
        e.stopPropagation();
        globalCtx?.register(-count);
        setCount(0);
        setResetKey(k => k + 1);
      }

      return (
        <FilterSectionContext.Provider value={{ register, resetKey, title }}>
          <HRule />
          <div style={{ display:"flex", flexDirection:"column", width:"100%", flexShrink:0 }}>
            <div
              onClick={() => setOpen(o => !o)}
              onMouseEnter={() => setHovered(true)}
              onMouseLeave={() => setHovered(false)}
              style={{ display:"flex", gap:8, alignItems:"center", padding:"12px 16px", width:"100%", cursor:"pointer", userSelect:"none", background:headerBg, position:"relative" }}
            >
              <span style={{ flex:1, fontWeight:500, fontSize:14, lineHeight:"20px", color:"#0e0f10", fontFamily:"'Inter', sans-serif" }}>
                {title}{required && <span style={{ color:"#e53935", marginLeft:2 }}>*</span>}
              </span>
              {count > 0 && (
                <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <div style={{ background:"#4e5a63", borderRadius:9999, minWidth:16, width:16, height:16, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    <span style={{ fontSize:12, fontWeight:700, color:"white", lineHeight:"16px" }}>{count}</span>
                  </div>
                  <span onClick={handleClear} style={{ fontSize:14, lineHeight:"20px", color:"#4e5a63", cursor:"pointer" }}>Clear</span>
                </div>
              )}
              <FilterArrow up={open} />
            </div>
            {open && (
              <div style={{ display:"flex", flexDirection:"column", gap:16, padding:"20px 16px", width:"100%" }}>
                {children}
              </div>
            )}
          </div>
        </FilterSectionContext.Provider>
      );
    }

                  const rows = [];
                  filterItems.forEach((item, i) => {
                    const includeTags = (item.tags || []).filter(t => t.type !== "exclude");
                    const excludeTags = (item.tags || []).filter(t => t.type === "exclude");
                    if (includeTags.length > 0 || (!item.tags || item.tags.length === 0)) {
                      rows.push({ key: i + "-inc", label: item.label, tags: includeTags });
                    }
                    if (excludeTags.length > 0) {
                      rows.push({ key: i + "-exc", label: "Excluded " + item.label, tags: excludeTags });

                                    <div key={j} className={`filter-tag ${tag.type === "exclude" ? "filter-tag-exclude" : "filter-tag-include"}`} style={{ flexShrink: isLast ? 1 : 0, minWidth: isLast ? 0 : undefined }}>

                        );

        setClearKey(k => k + 1);

          const filtered = LOC_SUGGESTIONS.filter(s => s.toLowerCase().includes(val.toLowerCase()));

          setShowSuggestions(filtered.length > 0);

          setShowSuggestions(false);
          onClear && onClear();

                  value={locVal}
                  onChange={e => { e.stopPropagation(); handleLocChange(e.target.value); }}
                  onKeyDown={e => {
                    if (e.key === "ArrowDown") {
                      e.preventDefault();
                      setActiveIdx(i => Math.min(i + 1, suggestions.length - 1));
                    } else if (e.key === "ArrowUp") {
                      e.preventDefault();
                      setActiveIdx(i => Math.max(i - 1, -1));
                    } else if (e.key === "Enter") {
                      if (activeIdx >= 0 && suggestions[activeIdx]) {
                        selectSuggestion(suggestions[activeIdx]);
                      } else if (locVal.trim()) {
                        setShowSuggestions(false);
                        onSearch && onSearch(locVal);
                      }
                    } else if (e.key === "Escape") {
                      setShowSuggestions(false);
                    }
                  }}
                  onFocus={() => suggestions.length > 0 && setShowSuggestions(true)}
                  onBlur={() => setTimeout(() => setShowSuggestions(false), 150)}
                  placeholder="Enter County, City, Zip Code, or APN #"
                  style={{ flex:1, background:"none", border:"none", fontSize:14, lineHeight:"20px", color:"#0e0f10", outline:"none", fontFamily:"inherit", minWidth:0 }}

                      style={{ padding:"8px 16px", fontSize:14, lineHeight:"20px", color:"#0e0f10", cursor:"pointer", background: i === activeIdx ? "#f0f4ff" : "white", borderBottom: i < suggestions.length - 1 ? "1px solid #f2f3f4" : "none" }}

            const items = [
              locVal ? { label: "Location", tags: [{ text: locVal, type: "include" }] } : null,

          })()}
          {showToast && <ToastNotification onDismiss={() => setShowToast(false)} />}
        </div>
        </React.Fragment>
        </GlobalFilterContext.Provider>
        )}
        </div>

    function FloatCard({ style, iconSrc, iconBg, children, opacity = 1, blur = false }) {
      return (
        <div style={{
          position:"absolute", ...style,
          background:"white", display:"flex", gap:8, alignItems:"center", padding:12,
          borderRadius:12, opacity,
          filter: blur ? "blur(1px)" : undefined,
          boxShadow:"0 0 2px rgba(51,146,255,0.12), 0 8px 16px rgba(51,146,255,0.12)",
        }}>
          <div style={{ position:"relative", borderRadius:100, flexShrink:0, width:37, height:37, background: iconBg || "linear-gradient(180deg,#edf5ff 0%,#f9f2ff 100%)" }}>
            <div style={{ position:"absolute", inset:"25%", overflow:"hidden" }}>
              <img alt="" style={{ position:"absolute", display:"block", maxWidth:"none", width:"100%", height:"100%" }} src={iconSrc} />
            </div>
          </div>
          <div style={{ display:"flex", flex:1, flexDirection:"column", alignItems:"flex-start", justifyContent:"center", minWidth:0 }}>
            {children}
          </div>
        </div>
      );
    }

    function ColumnItem({ col, checked, onChange, showDrag, onDragStart, onDragEnd }) {
      const [dragHandleHovered, setDragHandleHovered] = React.useState(false);
      return (
        <div
          draggable={showDrag}
          style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 16px",
            cursor: showDrag ? "grab" : "pointer",
            boxSizing:"border-box", background:"transparent" }}
          onClick={showDrag ? undefined : () => onChange(col.key, !checked)}
          onMouseEnter={e => e.currentTarget.style.background = "#f7f8f8"}
          onMouseLeave={e => e.currentTarget.style.background = "transparent"}
          onMouseDown={e => e.currentTarget.style.background = "#eff1f2"}
          onMouseUp={e => e.currentTarget.style.background = "#f7f8f8"}
          onDragStart={onDragStart}
          onDragEnd={onDragEnd}>
          {/* Checkbox — only clicking the checkbox icon toggles selection */}
          <div style={{ position:"relative", width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, cursor:"pointer" }}
            onClick={e => { e.stopPropagation(); onChange(col.key, !checked); }}>
            {checked ? (
              <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgEditColCheck2} />
            ) : (
              <div style={{ width:16, height:16, border:"2px solid #a0aab0", borderRadius:3, background:"white", flexShrink:0 }} />
            )}
          </div>
          {/* Label */}
          <span style={{ flex:1, fontSize:14, lineHeight:"20px", color:"#0e0f10", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{col.label}</span>
          {/* Drag handle — only on selected (checked) items */}
          {showDrag && (
            <div style={{ position:"relative", flexShrink:0 }}
              onMouseEnter={e => { e.stopPropagation(); setDragHandleHovered(true); }}
              onMouseLeave={e => { e.stopPropagation(); setDragHandleHovered(false); }}>
              {/* Tooltip */}
              {dragHandleHovered && (
                <div style={{ position:"absolute", bottom:"calc(100% + 8px)", right:"-4px", zIndex:300, width:188, display:"flex", flexDirection:"column", alignItems:"flex-end", pointerEvents:"none" }}>

                    <div style={{ width:11.314, height:11.314, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                      <div style={{ width:8, height:8, background:"#4e5a63", transform:"rotate(-45deg)", flexShrink:0 }} />
                    </div>

    function EditColumnsDropdown({ visibleCols, colOrder, onChange, onReset, onReorder }) {
      const [search, setSearch] = React.useState("");
      const [dragKey, setDragKey] = React.useState(null);
      const [dropIndex, setDropIndex] = React.useState(null);
      const selectedListRef = React.useRef(null);
      const query = search.trim().toLowerCase();

      // Build section map from ALL_COLUMNS
      const sectionMap = new Map();
      ALL_COLUMNS.forEach(col => {
        const s = col.section || "";
        if (!sectionMap.has(s)) sectionMap.set(s, []);
        sectionMap.get(s).push(col);
      });

      const filterCols = cols => query ? cols.filter(c => c.label.toLowerCase().includes(query)) : cols;

      // Selected items — ordered by colOrder (user-dragged order)
      const filteredSelected = filterCols(
        colOrder.map(k => ALL_COLUMNS.find(c => c.key === k)).filter(Boolean)
      );

      // Unselected items grouped by section — section hidden if all its items are selected
      const filteredUnselectedSections = SECTION_ORDER
        .map(s => ({ section:s, cols: filterCols((sectionMap.get(s) || []).filter(c => !visibleCols.has(c.key))) }))
        .filter(s => s.cols.length > 0);

      const hasSelected   = filteredSelected.length > 0;
      const hasUnselected = filteredUnselectedSections.length > 0;
      const noResults     = !hasSelected && !hasUnselected;

      // dragIdx: position of dragged item in the current list
      const dragIdx = dragKey ? filteredSelected.findIndex(c => c.key === dragKey) : -1;

      const handleDragStart = (e, key) => {
        e.dataTransfer.effectAllowed = "move";
        // Delay hiding the original so browser captures ghost image first
        setTimeout(() => { setDragKey(key); setDropIndex(null); }, 0);
      };
      const handleDragEnd = () => { setDragKey(null); setDropIndex(null); };

      // Per-item dragOver: gap position from cursor Y vs midpoint
      const handleItemDragOver = (e, i) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        const rect = e.currentTarget.getBoundingClientRect();
        const newIdx = e.clientY < rect.top + rect.height / 2 ? i : i + 1;
        if (newIdx !== dropIndex) setDropIndex(newIdx);
      };
      // Only clear when cursor leaves the entire selected list
      const handleItemDragLeave = (e) => {
        if (selectedListRef.current && !selectedListRef.current.contains(e.relatedTarget)) {
          setDropIndex(null);
        }
      };
      const handleItemDrop = (e) => {
        e.preventDefault();
        if (!dragKey || dropIndex === null) { setDragKey(null); setDropIndex(null); return; }
        // Map dropIndex (in filteredSelected space) to insert position excluding the dragged item
        const withoutDragged = filteredSelected.filter(c => c.key !== dragKey);
        const adjustedIdx = dropIndex > dragIdx ? dropIndex - 1 : dropIndex;
        const insertBeforeKey = withoutDragged[adjustedIdx]?.key;
        const newOrder = colOrder.filter(k => k !== dragKey);
        if (insertBeforeKey) {
          newOrder.splice(newOrder.indexOf(insertBeforeKey), 0, dragKey);
        } else {
          newOrder.push(dragKey);
        }
        onReorder(newOrder);
        setDragKey(null);
        setDropIndex(null);
      };

      return (
        <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, width:318, background:"white", borderRadius:8,
          boxShadow:"0 12px 24px 0 rgba(0,0,0,0.12), 0 0 2px 0 rgba(0,0,0,0.12)", zIndex:200, paddingTop:8, paddingBottom:8 }}>
          {/* Reset to Default */}
          <div style={{ display:"flex", alignItems:"center", gap:4, padding:"10px 16px", cursor:"pointer" }}
            onClick={onReset}
            onMouseEnter={e => e.currentTarget.style.background = "#f7f8f8"}
            onMouseLeave={e => e.currentTarget.style.background = "transparent"}
            onMouseDown={e => e.currentTarget.style.background = "#eff1f2"}
            onMouseUp={e => e.currentTarget.style.background = "#f7f8f8"}>
            <div style={{ position:"relative", width:20, height:20, flexShrink:0 }}>
              <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgEditColReset2} />
            </div>
            <span style={{ fontSize:14, lineHeight:"20px", color:"#0e0f10" }}>Reset to Default</span>
          </div>
          {/* Divider */}
          <div style={{ padding:"8px 0" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>
          {/* Search bar */}
          <div style={{ padding:"8px 16px" }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, height:36, border:"1px solid #c0c6cb", borderRadius:8, padding:"0 16px", background:"white" }}>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Search columns"
                style={{ flex:1, border:"none", outline:"none", fontSize:14, color:"#4e5a63", fontFamily:"inherit", background:"transparent", minWidth:0 }} />
              <div style={{ position:"relative", width:20, height:20, flexShrink:0 }}>
                <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgEditColSearch2} />
              </div>
            </div>
          </div>
          {/* Column list */}
          <div className="edit-col-scroll" style={{ maxHeight:495, overflowY:"auto" }}>
            {/* Selected items — item stays in DOM while dragging (opacity faded), box-shadow blue line */}
            <div ref={selectedListRef}>
              {filteredSelected.map((col, i) => {
                const isDragging = col.key === dragKey;
                const isLast = i === filteredSelected.length - 1;
                // Don't show indicator at dragged item's own gap (no-op drop)
                const validDrop = dropIndex !== dragIdx && dropIndex !== dragIdx + 1;
                const shadow = (validDrop && dropIndex === i)
                  ? "inset 0 2px 0 #0056ce"
                  : (validDrop && isLast && dropIndex === filteredSelected.length)
                    ? "inset 0 -2px 0 #0056ce"
                    : "none";
                return (
                  <div key={col.key}
                    style={{ opacity: isDragging ? 0 : 1, boxShadow: shadow }}
                    onDragOver={e => handleItemDragOver(e, i)}
                    onDragLeave={handleItemDragLeave}
                    onDrop={handleItemDrop}>
                    <ColumnItem col={col} checked={true} onChange={onChange} showDrag={true}
                      onDragStart={e => handleDragStart(e, col.key)}
                      onDragEnd={handleDragEnd}
                    />
                  </div>
                );
              })}
            </div>
            {/* Divider between selected and unselected groups */}
            {hasSelected && hasUnselected && (
              <div style={{ padding:"8px 0" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>
            )}
            {/* Unselected items by section — section title hidden if fully selected */}
            {filteredUnselectedSections.map(({ section, cols }, i) => (
              <div key={section}>
                {i > 0 && <div style={{ padding:"8px 0" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>}
                <div style={{ padding:"8px 16px 4px", fontSize:12, fontWeight:500, color:"#4e5a63", letterSpacing:"0.24px", fontFamily:"Inter, sans-serif" }}>{section}</div>
                {cols.map(col => (
                  <ColumnItem key={col.key} col={col} checked={false} onChange={onChange} showDrag={false} />
                ))}
              </div>
            ))}
            {noResults && (
              <div style={{ padding:"16px", textAlign:"center", fontSize:14, color:"#818d96" }}>No columns found</div>
            )}
          </div>
        </div>
      );
    }

    // ── Main section ──────────────────────────────────────────────────────────
    function MainSection({ filtersCollapsed, onToggleFilters }) {
      const [selectedRows, setSelectedRows] = React.useState(new Set());

      const [visibleCols, setVisibleCols] = React.useState(new Set(DEFAULT_COL_KEYS));
      const [showExportModal, setShowExportModal] = React.useState(false);
      const [colOrder, setColOrder] = React.useState(DEFAULT_COL_ORDER);
      const [showEditCols, setShowEditCols] = React.useState(false);
      const editColsRef = React.useRef(null);
      const PAGE_SIZE = 25;
      const TOTAL_PAGES = Math.ceil(TOTAL_RECORDS / PAGE_SIZE);
      const pageRef = React.useRef(null);
      React.useEffect(() => {
        if (!pageDropOpen) return;
        const handler = (e) => { if (pageRef.current && !pageRef.current.contains(e.target)) setPageDropOpen(false); };

      }, [pageDropOpen]);
      React.useEffect(() => {
        if (!showEditCols) return;

      }, [showEditCols]);
      const activeCols = colOrder.map(k => ALL_COLUMNS.find(c => c.key === k)).filter(Boolean);
      const handleColChange = (key, checked) => {
        setVisibleCols(prev => { const next = new Set(prev); checked ? next.add(key) : next.delete(key); return next; });

            ) : (
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="6.17" stroke="#4e5a63" strokeWidth="1.5"/>
                <path d="M8 5v3.2l2 1.4" stroke="#4e5a63" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            )}
          </div>
          {/* Content */}
          <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", gap:4 }}>
            {/* Title row */}
            <div style={{ display:"flex", gap:8, alignItems:"center", width:"100%" }}>
              <span style={{ fontFamily:"Inter, sans-serif", fontWeight:600, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap", flexShrink:0 }}>{item.title}</span>
              <div style={{ display:"flex", gap:4, alignItems:"center", flex:1, minWidth:0 }}>
                <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>{item.time}</span>
                <span style={{ width:2, height:2, background:"#4e5a63", borderRadius:"50%", flexShrink:0, display:"inline-block" }} />
                <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>{item.results}</span>
              </div>
              {/* Bookmark */}
              <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <div style={{ position:"relative", width:16, height:16, flexShrink:0 }}>
                  <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgSavedBookmark} />
                </div>
              </div>
            </div>
            {/* Filter tags row */}
            <FilterPillsRow />
          </div>
        </div>
      );
    }

    function SavedFilterItem({ item }) {
      const [hovered, setHovered] = useState(false);
      return (
        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{ display:"flex", gap:4, alignItems:"flex-start", padding:"12px", borderRadius:8, background:hovered?"#f7f8f8":"transparent", cursor:"pointer" }}
        >
          {/* Left icon: bookmark or arrow */}
          <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            {hovered ? (
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 8h10M9 4l4 4-4 4" stroke="#0e0f10" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            ) : (
              <div style={{ overflow:"hidden", position:"relative", width:16, height:16, flexShrink:0 }}>
                <img alt="" style={{ position:"absolute", display:"block", width:"100%", height:"100%", maxWidth:"none" }} src={imgSavedBookmark} />
              </div>
            )}
          </div>
          {/* Content */}
          <div style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column", gap:4 }}>
            {/* Title row */}
            <div style={{ display:"flex", gap:8, alignItems:"center", width:"100%" }}>
              <span style={{ fontFamily:"Inter, sans-serif", fontWeight:600, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap", flexShrink:0 }}>{item.title}</span>
              <div style={{ flex:1, minWidth:0 }}>
                <span style={{ fontFamily:"Helvetica, sans-serif", fontSize:12, lineHeight:"16px", color:"#4e5a63", whiteSpace:"nowrap" }}>{item.results}</span>
              </div>
              {/* 3-dot menu */}
              <div style={{ width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="3" r="1.5" fill="#4e5a63"/>
                  <circle cx="8" cy="8" r="1.5" fill="#4e5a63"/>
                  <circle cx="8" cy="13" r="1.5" fill="#4e5a63"/>
                </svg>
              </div>
            </div>
            {/* Filter tags row */}
            <FilterPillsRow />
          </div>
        </div>
      );
    }

    function HomeSection() {
      const [activeTab, setActiveTab] = useState("recent");
      return (
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", background:"white", overflowY:"auto", paddingTop:150, paddingBottom:24, paddingLeft:24, paddingRight:24, gap:32 }}>
          {/* Title + description */}
          <div style={{ display:"flex", flexDirection:"column", gap:8, alignItems:"center", maxWidth:600, width:"100%", textAlign:"center" }}>
            <p style={{ fontFamily:"Inter, sans-serif", fontWeight:600, fontSize:24, lineHeight:"28px", letterSpacing:"-0.2px", color:"#0e0f10", margin:0 }}>
              Start your search to build a list
            </p>
            <p style={{ fontFamily:"Helvetica, sans-serif", fontWeight:400, fontSize:14, lineHeight:"20px", color:"#0e0f10", margin:0 }}>
              Over <strong style={{ fontWeight:700 }}>1.4B</strong> B2B Contacts and <strong style={{ fontWeight:700 }}>125M</strong> Properties researched in real-time with the power of AI.
            </p>
          </div>
          {/* Recently Searched card */}
          <div style={{ border:"1px solid #dfe3e5", borderRadius:8, display:"flex", flexDirection:"column", paddingBottom:16, paddingTop:12, paddingLeft:16, paddingRight:16, width:700, flexShrink:0, gap:20 }}>
            {/* Tabs */}
            <div style={{ borderBottom:"1px solid #dfe3e5", display:"flex", gap:20, marginBottom:-1 }}>
              <div onClick={() => setActiveTab("recent")} style={{ borderBottom: activeTab==="recent" ? "2px solid #00132d" : "2px solid transparent", padding:"8px 0", cursor:"pointer" }}>
                <span style={{ fontFamily:"Inter, sans-serif", fontWeight: activeTab==="recent" ? 600 : 500, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap" }}>Recently Searched</span>
              </div>
              <div onClick={() => setActiveTab("saved")} style={{ borderBottom: activeTab==="saved" ? "2px solid #00132d" : "2px solid transparent", padding:"8px 0", cursor:"pointer", display:"flex", gap:8, alignItems:"center" }}>
                <span style={{ fontFamily:"Inter, sans-serif", fontWeight: activeTab==="saved" ? 600 : 500, fontSize:14, lineHeight:"20px", color:"#0e0f10", whiteSpace:"nowrap" }}>Saved Filters</span>
                <div style={{ background:"#dfe3e5", borderRadius:9999, width:20, height:20, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <span style={{ fontFamily:"Helvetica, sans-serif", fontWeight:700, fontSize:12, lineHeight:"20px", color:"#4e5a63", textAlign:"center" }}>3</span>
                </div>
              </div>
            </div>
            {/* Items */}
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              {(activeTab === "recent" ? RECENT_SEARCHES : SAVED_FILTERS_DATA).map((item, i) => (
                <React.Fragment key={item.id}>
                  {i > 0 && <div style={{ padding:"0 12px" }}><div style={{ height:1, background:"#dfe3e5" }} /></div>}
                  {activeTab === "recent" ? <RecentSearchItem item={item} /> : <SavedFilterItem item={item} />}
                </React.Fragment>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState("landing"); // "landing" | "table" | "home"
      const [filtersCollapsed, setFiltersCollapsed] = useState(false);
      return (
        <div style={{ background:"white", display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden" }}>
          <Header />
          <div style={{ display:"flex", flex:1, alignItems:"stretch", minHeight:0 }}>
            <Sidebar />
            <FiltersPanel
              onSearch={() => setView("table")}
              onClear={() => setView("home")}
              collapsed={filtersCollapsed}
              onCollapseChange={setFiltersCollapsed}
            />
            {view === "table"
              ? <MainSection filtersCollapsed={filtersCollapsed} onToggleFilters={() => setFiltersCollapsed(v => !v)} />
              : view === "home" ? <HomeSection /> : <LandingSection />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
